name: Deploy frontend

on:
  # Optional backup deploy — primary path is Cloudflare Workers Git (dashboard).
  # Manual only; does not replace Cloudflare's Git integration.
  workflow_dispatch:

concurrency:
  group: deploy-frontend
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Require deploy secrets
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLERK_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
        run: |
          if [[ -z "$CF_TOKEN" || -z "$CF_ACCOUNT" || -z "$CLERK_KEY" ]]; then
            echo "::error::Set CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID, and VITE_CLERK_PUBLISHABLE_KEY as GitHub secrets (repo or production environment)."
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        env:
          VITE_API_BASE: https://api.myhomecloud.dev
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
        run: npm run build

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: frontend
          wranglerVersion: "4"
          command: deploy
