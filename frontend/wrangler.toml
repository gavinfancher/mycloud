# Workers + static assets (Git-connected deploy on push to main).
# Cloudflare runs: npm run build → npx wrangler deploy
# Dashboard: root directory MUST be `frontend` | build npm run build | deploy npx wrangler deploy
# Build watch paths (Settings → Build): include `frontend/*` so backend-only pushes skip CF builds
name = "homecloud"
account_id = "2750df8a500fb8335c195bad8cccc14a"
compatibility_date = "2026-06-13"

[assets]
directory = "./dist"
not_found_handling = "single-page-application"
