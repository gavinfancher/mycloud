services:
  controller:
    build: .
    container_name: homecloud
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file: .env
    volumes:
      - ./.homecloud:/app/.homecloud
      - ./ssh:/mnt/ssh:ro
      # controller writes Caddy site files into this volume
      - caddy_sites:/etc/caddy/sites
      # Phase 06: controller writes CoreDNS zone files into this volume
      - coredns_zones:/etc/coredns
    working_dir: /app
    depends_on:
      - caddy

  caddy:
    image: caddy:2
    container_name: homecloud-caddy
    restart: unless-stopped
    # No public ports needed — cloudflared reaches Caddy over the compose
    # network using the service name "caddy".
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      # caddy_sites volume is read-only for Caddy; the controller writes here
      - caddy_sites:/etc/caddy/sites:ro

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: homecloud-cloudflared
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - caddy

  coredns:
    image: coredns/coredns:latest
    container_name: homecloud-coredns
    restart: unless-stopped
    command: -conf /etc/coredns/Corefile
    volumes:
      - ./infra/coredns/Corefile:/etc/coredns/Corefile:ro
      # controller writes db.myhomecloud.dev into this shared volume
      - coredns_zones:/etc/coredns
    ports:
      # Bind on tailnet IP only — avoids conflict with systemd-resolved on 127.0.0.53
      - "${CONTROL_NODE_TAILSCALE_IP:?set CONTROL_NODE_TAILSCALE_IP}:53:53/udp"
      - "${CONTROL_NODE_TAILSCALE_IP:?set CONTROL_NODE_TAILSCALE_IP}:53:53/tcp"

volumes:
  caddy_sites:
  # Phase 06: CoreDNS zone files (declared here for forward-compat)
  coredns_zones:
